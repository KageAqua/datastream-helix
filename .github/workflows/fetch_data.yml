name: Fetch Market Data

on:
  schedule:
    - cron: '20 9 * * 1-5'   # 9:20 AM UTC = 2:50 PM IST, weekdays only
    - cron: '50 3 * * 1-5'   # 3:50 AM UTC = 9:20 AM IST, weekdays only
  workflow_dispatch:           # Manual trigger button in Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
