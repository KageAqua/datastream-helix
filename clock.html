<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exchange Clock — Datastream Helix</title>
  <style>
    :root { --accent: #FFD700; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }
    body { background:#0d0d0d; color:#f0f0f0; padding:14px; }
    .container { max-width:980px; margin:auto; }
    h2 { text-align:center; color:var(--accent); font-size:1.3em; margin-bottom:3px; }
    .subtitle { text-align:center; color:#666; font-size:0.76em; margin-bottom:14px; }

    /* IST Master Clock */
    .master-clock { text-align:center; margin-bottom:18px; }
    .ist-time { font-size:2.8em; font-weight:bold; color:var(--accent); letter-spacing:2px; }
    .ist-date { font-size:0.82em; color:#888; margin-top:2px; }
    .ist-label { font-size:0.72em; color:#555; text-transform:uppercase; letter-spacing:2px; }

    /* Exchange grid */
    .ex-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
               gap:12px; margin-bottom:16px; }
    .ex-card { background:#141414; border-radius:10px; padding:14px;
               border:1px solid #222; transition:all 0.3s; position:relative; overflow:hidden; }
    .ex-card::before { content:''; position:absolute; top:0; left:0; width:4px;
                       height:100%; background:var(--card-accent); }
    .ex-card.open   { border-color:#51cf6633; --card-accent:#51cf66; }
    .ex-card.closed { border-color:#ff6b6b22; --card-accent:#ff6b6b; }
    .ex-card.pre    { border-color:#74c0fc33; --card-accent:#74c0fc; }
    .ex-card.soon-open  { border-color:#FFD70033; --card-accent:#FFD700; }
    .ex-card.soon-close { border-color:#ff9a0033; --card-accent:#ff9a00; }

    .ex-header { display:flex; align-items:center; justify-content:space-between;
                 margin-bottom:8px; }
    .ex-name { font-size:0.95em; font-weight:bold; }
    .ex-flag { font-size:1.3em; margin-right:6px; }
    .status-badge { padding:3px 10px; border-radius:10px; font-size:0.72em;
                    font-weight:bold; white-space:nowrap; }
    .badge-open       { background:#51cf6622; color:#51cf66; border:1px solid #51cf66; }
    .badge-closed     { background:#ff6b6b22; color:#ff6b6b; border:1px solid #ff6b6b; }
    .badge-pre        { background:#74c0fc22; color:#74c0fc; border:1px solid #74c0fc; }
    .badge-soon-open  { background:#FFD70022; color:#FFD700; border:1px solid #FFD700; animation:pulse 1.5s infinite; }
    .badge-soon-close { background:#ff9a0022; color:#ff9a00; border:1px solid #ff9a00; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .ex-times { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px; }
    .ex-time-block { background:#0d0d0d; border-radius:6px; padding:7px 10px; }
    .ex-time-label { font-size:0.65em; color:#666; text-transform:uppercase;
                     letter-spacing:1px; margin-bottom:2px; }
    .ex-time-val   { font-size:1.05em; font-weight:bold; }
    .ex-time-local { font-size:0.7em; color:#555; margin-top:1px; }

    .ex-hours { margin-top:8px; font-size:0.74em; color:#666;
                display:flex; justify-content:space-between; flex-wrap:wrap; gap:4px; }
    .ex-hours span { color:#aaa; }

    .countdown { margin-top:8px; padding:7px 10px; background:#0d0d0d;
                 border-radius:6px; font-size:0.78em; text-align:center; }
    .countdown .cd-label { color:#666; font-size:0.85em; }
    .countdown .cd-val   { font-size:1.1em; font-weight:bold; margin-top:2px; }

    /* Progress bar for session */
    .session-bar { margin-top:8px; height:4px; background:#1a1a1a; border-radius:2px; overflow:hidden; }
    .session-fill { height:100%; border-radius:2px; transition:width 1s; }
    .session-fill.open-fill   { background:linear-gradient(to right,#51cf66,#2f9e44); }
    .session-fill.closed-fill { background:#2a2a2a; }

    /* Market sessions overview */
    .sessions-bar { background:#111; border:1px solid #1e1e1e; border-radius:8px;
                    padding:12px 16px; margin-bottom:16px; }
    .sessions-title { font-size:0.75em; color:#666; text-transform:uppercase;
                      letter-spacing:1px; margin-bottom:10px; }
    .timeline { position:relative; height:32px; background:#1a1a1a; border-radius:4px;
                overflow:hidden; margin-bottom:6px; }
    .tl-segment { position:absolute; height:100%; display:flex; align-items:center;
                  justify-content:center; font-size:0.68em; font-weight:bold;
                  transition:all 0.5s; }
    .tl-now { position:absolute; width:2px; background:#FFD700; height:100%;
              z-index:10; top:0; }
    .tl-labels { display:flex; justify-content:space-between; font-size:0.65em; color:#555; }
    .tl-legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
    .tl-leg-item { display:flex; align-items:center; gap:5px; font-size:0.72em; color:#888; }
    .tl-leg-dot  { width:10px; height:10px; border-radius:2px; }

    .status-bar { text-align:center; color:#555; font-size:0.72em; margin-top:10px; }
    @media(max-width:600px){
      .ist-time { font-size:2em; }
      .ex-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <h2>🌐 Global Exchange Clock</h2>
  <div class="subtitle">Live session status for major bullion & commodity exchanges</div>

  <!-- Master IST Clock -->
  <div class="master-clock">
    <div class="ist-label">India Standard Time (IST)</div>
    <div class="ist-time" id="ist-time">--:--:--</div>
    <div class="ist-date" id="ist-date">--</div>
  </div>

  <!-- 24hr Timeline -->
  <div class="sessions-bar">
    <div class="sessions-title">📅 Today's Exchange Sessions (IST Timeline — 24hr)</div>
    <div class="timeline" id="timeline">
      <div class="tl-now" id="tl-now"></div>
    </div>
    <div class="tl-labels">
      <span>12 AM</span><span>3 AM</span><span>6 AM</span><span>9 AM</span>
      <span>12 PM</span><span>3 PM</span><span>6 PM</span><span>9 PM</span><span>12 AM</span>
    </div>
    <div class="tl-legend" id="tl-legend"></div>
  </div>

  <!-- Exchange Cards -->
  <div class="ex-grid" id="ex-grid"></div>

  <div class="status-bar" id="status-bar">🕐 Updating every second...</div>

</div>
<script>
// ── Exchange definitions (all times in IST) ───────────────────────────────────
// Sessions: [open_hour, open_min, close_hour, close_min] in IST
// overnight: true = session crosses midnight
const EXCHANGES = [
  {
    id:'mcx', flag:'🇮🇳', name:'MCX India',
    location:'Mumbai, India', tz:'Asia/Kolkata', tzLabel:'IST',
    color:'#2f9e44',
    sessions:[
      { label:'Morning',  ist:[9,0,  23,30], overnight:false },
    ],
    pre:[8,45], note:'Commodity Futures — Gold, Silver, Crude'
  },
  {
    id:'nse', flag:'🇮🇳', name:'NSE Commodity',
    location:'Mumbai, India', tz:'Asia/Kolkata', tzLabel:'IST',
    color:'#1971c2',
    sessions:[
      { label:'Session', ist:[9,0, 23,30], overnight:false }
    ],
    pre:[8,45], note:'NSE Commodity Derivatives — Gold, Silver'
  },
  {
    id:'comex', flag:'🇺🇸', name:'COMEX / CME',
    location:'New York, USA', tz:'America/New_York', tzLabel:'ET',
    color:'#e03131',
    sessions:[
      // Globex: 6 PM ET Sun – 5 PM ET Fri = 4:30 AM IST – 3:00 AM IST+1
      { label:'Globex', ist:[4,30, 27,0], overnight:true },  // 27:00 = 3:00 AM next day
    ],
    pre:[4,15], note:'Gold (GC), Silver (SI) Futures'
  },
  {
    id:'lbma', flag:'🇬🇧', name:'LBMA London',
    location:'London, UK', tz:'Europe/London', tzLabel:'GMT/BST',
    color:'#9c36b5',
    sessions:[
      { label:'OTC', ist:[13,30, 21,30], overnight:false }
    ],
    pre:[13,15], note:'Gold & Silver Spot — AM/PM Fix'
  },
  {
    id:'sge', flag:'🇨🇳', name:'SGE Shanghai',
    location:'Shanghai, China', tz:'Asia/Shanghai', tzLabel:'CST',
    color:'#f03e3e',
    sessions:[
      { label:'Morning', ist:[6,30,  11,30], overnight:false },
      { label:'Evening', ist:[13,0,  16,0],  overnight:false },
      { label:'Night',   ist:[21,0,  23,30], overnight:false },
    ],
    pre:[6,15], note:'Shanghai Gold Exchange'
  },
  {
    id:'tocom', flag:'🇯🇵', name:'TOCOM Tokyo',
    location:'Tokyo, Japan', tz:'Asia/Tokyo', tzLabel:'JST',
    color:'#f76707',
    sessions:[
      { label:'Day',   ist:[5,45,  14,30], overnight:false },
      { label:'Night', ist:[16,30, 23,30], overnight:false },
    ],
    pre:[5,30], note:'Tokyo Commodity Exchange'
  },
  {
    id:'dgcx', flag:'🇦🇪', name:'DGCX Dubai',
    location:'Dubai, UAE', tz:'Asia/Dubai', tzLabel:'GST',
    color:'#1098ad',
    sessions:[
      { label:'Session', ist:[11,30, 23,30], overnight:false }
    ],
    pre:[11,15], note:'Dubai Gold & Commodities Exchange'
  },
  {
    id:'ibja', flag:'🇮🇳', name:'IBJA Spot Rate',
    location:'Mumbai, India', tz:'Asia/Kolkata', tzLabel:'IST',
    color:'#FFD700',
    sessions:[
      { label:'AM Fix', ist:[11,30, 12,0],  overnight:false },
      { label:'PM Fix', ist:[17,0,  17,30], overnight:false },
    ],
    pre:[11,15], note:'India Bullion & Jewellers Association Spot'
  },
];

function getISTMinutes(){
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  return ist.getHours()*60 + ist.getMinutes() + ist.getSeconds()/60;
}

function getTimeInTZ(tz){
  return new Date().toLocaleString('en-US',{
    timeZone:tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  });
}

function getDateInTZ(tz){
  return new Date().toLocaleString('en-IN',{
    timeZone:tz, weekday:'short', day:'numeric', month:'short'
  });
}

function fmtCountdown(diffMins){
  if(diffMins<=0) return 'Now';
  const h = Math.floor(Math.abs(diffMins)/60);
  const m = Math.floor(Math.abs(diffMins)%60);
  return (h>0?h+'h ':'')+m+'m';
}

function getStatus(ex, nowMin){
  let status='closed', nextEvent=null, nextMins=0, sessionPct=0;
  const WARN=30; // minutes warning

  for(const sess of ex.sessions){
    let [oh,om,ch,cm] = [...sess.ist[0,1],sess.ist[2],sess.ist[3]];
    let openMin = sess.ist[0]*60+sess.ist[1];
    let closeMin = sess.ist[2]*60+sess.ist[3];

    // Handle overnight (closeMin > 24*60)
    if(sess.overnight){
      // e.g. opens 4:30, closes 27:00 (= 3:00 AM next day)
      // if nowMin >= openMin OR nowMin < closeMin-1440
      const adjClose = closeMin - 1440;
      if(nowMin >= openMin || nowMin < adjClose){
        status='open';
        sessionPct = nowMin>=openMin
          ? Math.min(100,((nowMin-openMin)/(1440-openMin+adjClose))*100)
          : Math.min(100,((1440-openMin+nowMin)/(1440-openMin+adjClose))*100);
        const timeToClose = nowMin>=openMin ? (1440-nowMin+adjClose) : (adjClose-nowMin);
        if(timeToClose<=WARN){ status='soon-close'; nextMins=timeToClose; }
        break;
      }
    } else {
      if(nowMin>=openMin && nowMin<closeMin){
        status='open';
        sessionPct=Math.min(100,((nowMin-openMin)/(closeMin-openMin))*100);
        const timeToClose=closeMin-nowMin;
        if(timeToClose<=WARN){ status='soon-close'; nextMins=timeToClose; }
        break;
      }
    }
  }

  if(status==='closed'||status==='soon-close'){
    // Check pre-open
    const preMin=ex.pre[0]*60+ex.pre[1];
    const firstOpen=ex.sessions[0].ist[0]*60+ex.sessions[0].ist[1];
    if(nowMin>=preMin&&nowMin<firstOpen){ status='pre'; }
  }

  // Find next open/close countdown
  if(status==='closed'||status==='pre'){
    let minDiff=9999;
    for(const sess of ex.sessions){
      const openMin=sess.ist[0]*60+sess.ist[1];
      let diff=openMin-nowMin;
      if(diff<0) diff+=1440;
      if(diff<minDiff){ minDiff=diff; }
    }
    nextMins=minDiff;
    nextEvent='opens';
  } else if(status==='open'||status==='soon-close'){
    nextEvent='closes';
  }

  return {status, nextEvent, nextMins, sessionPct};
}

function renderCards(){
  const nowMin=getISTMinutes();
  const grid=document.getElementById('ex-grid');

  EXCHANGES.forEach(ex=>{
    const {status,nextEvent,nextMins,sessionPct}=getStatus(ex,nowMin);
    const localTime=getTimeInTZ(ex.tz);
    const localDate=getDateInTZ(ex.tz);
    const istTime=getTimeInTZ('Asia/Kolkata');

    const badgeMap={
      open:      ['badge-open',      '🟢 OPEN'],
      closed:    ['badge-closed',    '🔴 CLOSED'],
      pre:       ['badge-pre',       '🔵 PRE-OPEN'],
      'soon-open': ['badge-soon-open','🟡 OPENING SOON'],
      'soon-close':['badge-soon-close','🟠 CLOSING SOON'],
    };
    const [badgeCls,badgeTxt]=badgeMap[status]||['badge-closed','🔴 CLOSED'];

    const sessHours=ex.sessions.map(s=>
      `${String(s.ist[0]).padStart(2,'0')}:${String(s.ist[1]).padStart(2,'0')} – `+
      `${String(s.ist[2]%24).padStart(2,'0')}:${String(s.ist[3]).padStart(2,'0')} IST`+
      (ex.sessions.length>1?' ('+s.label+')':'')
    ).join(' | ');

    const countdownHTML = nextMins>0
      ? `<div class="countdown">
          <div class="cd-label">${nextEvent==='opens'?'⏱ Opens in':'⏱ Closes in'}</div>
          <div class="cd-val" style="color:${nextEvent==='opens'?'#51cf66':'#ff9a00'}">${fmtCountdown(nextMins)}</div>
        </div>` : '';

    const id='card-'+ex.id;
    let card=document.getElementById(id);
    if(!card){
      card=document.createElement('div');
      card.id=id;
      grid.appendChild(card);
    }
    card.className='ex-card '+status;
    card.style.setProperty('--card-accent',ex.color);
    card.innerHTML=`
      <div class="ex-header">
        <div class="ex-name">${ex.flag} ${ex.name}</div>
        <span class="status-badge ${badgeCls}">${badgeTxt}</span>
      </div>
      <div style="font-size:0.7em;color:#555;margin-bottom:8px">${ex.location} · ${ex.note}</div>
      <div class="ex-times">
        <div class="ex-time-block">
          <div class="ex-time-label">Local Time</div>
          <div class="ex-time-val" style="color:${ex.color}">${localTime}</div>
          <div class="ex-time-local">${localDate} ${ex.tzLabel}</div>
        </div>
        <div class="ex-time-block">
          <div class="ex-time-label">IST</div>
          <div class="ex-time-val" style="color:var(--accent)">${istTime}</div>
          <div class="ex-time-local">India Standard Time</div>
        </div>
      </div>
      <div class="ex-hours">
        <span>🕐 Hours:</span> <span>${sessHours}</span>
      </div>
      ${countdownHTML}
      <div class="session-bar">
        <div class="session-fill ${status==='open'||status==='soon-close'?'open-fill':'closed-fill'}"
             style="width:${sessionPct.toFixed(1)}%"></div>
      </div>
    `;
  });
}

function renderTimeline(){
  const nowMin=getISTMinutes();
  const timeline=document.getElementById('timeline');
  const pct=(nowMin/1440)*100;
  document.getElementById('tl-now').style.left=pct+'%';

  // Draw segments
  const existing=timeline.querySelectorAll('.tl-segment');
  existing.forEach(e=>e.remove());

  EXCHANGES.forEach(ex=>{
    ex.sessions.forEach(sess=>{
      const openPct=(sess.ist[0]*60+sess.ist[1])/1440*100;
      const closePct=Math.min(100,(sess.ist[2]*60+sess.ist[3])/1440*100);
      const seg=document.createElement('div');
      seg.className='tl-segment';
      seg.style.left=openPct+'%';
      seg.style.width=Math.max(0.5,closePct-openPct)+'%';
      seg.style.background=ex.color+'55';
      seg.style.borderLeft='1px solid '+ex.color;
      seg.style.color=ex.color;
      seg.title=ex.name;
      if(closePct-openPct>5) seg.textContent=ex.flag;
      timeline.appendChild(seg);
    });
  });

  // Legend
  const legend=document.getElementById('tl-legend');
  if(!legend.children.length){
    EXCHANGES.forEach(ex=>{
      const item=document.createElement('div');
      item.className='tl-leg-item';
      item.innerHTML=`<div class="tl-leg-dot" style="background:${ex.color}"></div>${ex.flag} ${ex.name}`;
      legend.appendChild(item);
    });
  }
}

function updateMasterClock(){
  const now=new Date();
  const ist=now.toLocaleString('en-IN',{timeZone:'Asia/Kolkata',
    hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const date=now.toLocaleString('en-IN',{timeZone:'Asia/Kolkata',
    weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('ist-time').textContent=ist;
  document.getElementById('ist-date').textContent=date;
}

function tick(){
  updateMasterClock();
  renderCards();
  renderTimeline();
}

tick();
setInterval(tick,1000);
</script>
</body>
</html>
