<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exchange Clock — Datastream Helix</title>
  <style>
    :root { --accent: #FFD700; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }
    body { background:#0d0d0d; color:#f0f0f0; padding:14px; }
    .container { max-width:980px; margin:auto; }
    h2 { text-align:center; color:var(--accent); font-size:1.3em; margin-bottom:3px; }
    .subtitle { text-align:center; color:#666; font-size:0.76em; margin-bottom:14px; }

    .master-clock { text-align:center; margin-bottom:18px; }
    .ist-time  { font-size:2.8em; font-weight:bold; color:var(--accent); letter-spacing:2px; }
    .ist-date  { font-size:0.82em; color:#888; margin-top:2px; }
    .ist-label { font-size:0.72em; color:#555; text-transform:uppercase; letter-spacing:2px; }

    .ex-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; margin-bottom:16px; }
    .ex-card { background:#141414; border-radius:10px; padding:14px;
               border:2px solid #222; position:relative; overflow:hidden; }
    .ex-card.open       { border-color:#51cf66; }
    .ex-card.closed     { border-color:#2a2a2a; }
    .ex-card.pre        { border-color:#74c0fc; }
    .ex-card.soon-open  { border-color:#FFD700; }
    .ex-card.soon-close { border-color:#ff9a00; }

    .ex-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .ex-name   { font-size:0.95em; font-weight:bold; }
    .status-badge { padding:3px 10px; border-radius:10px; font-size:0.72em; font-weight:bold; }
    .badge-open       { background:#51cf6622; color:#51cf66; border:1px solid #51cf66; }
    .badge-closed     { background:#ff6b6b22; color:#ff6b6b; border:1px solid #ff6b6b; }
    .badge-pre        { background:#74c0fc22; color:#74c0fc; border:1px solid #74c0fc; }
    .badge-soon-open  { background:#FFD70022; color:#FFD700; border:1px solid #FFD700; animation:pulse 1.5s infinite; }
    .badge-soon-close { background:#ff9a0022; color:#ff9a00; border:1px solid #ff9a00; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    .ex-times  { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px; }
    .ex-time-block { background:#0d0d0d; border-radius:6px; padding:7px 10px; }
    .ex-time-label { font-size:0.65em; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
    .ex-time-val   { font-size:1.05em; font-weight:bold; }
    .ex-time-sub   { font-size:0.68em; color:#555; margin-top:1px; }

    .ex-hours  { margin-top:8px; font-size:0.73em; color:#666; }
    .ex-hours span { color:#aaa; }

    .countdown { margin-top:8px; padding:7px 10px; background:#0d0d0d;
                 border-radius:6px; font-size:0.78em; text-align:center; }
    .cd-label { color:#666; font-size:0.85em; }
    .cd-val   { font-size:1.15em; font-weight:bold; margin-top:2px; }

    .session-bar  { margin-top:8px; height:5px; background:#1a1a1a; border-radius:3px; overflow:hidden; }
    .session-fill { height:100%; border-radius:3px; transition:width 1s; }
    .fill-open   { background:linear-gradient(to right,#51cf66,#2f9e44); }
    .fill-closed { background:#252525; }
    .fill-soon   { background:linear-gradient(to right,#ff9a00,#e67700); }

    .sessions-bar   { background:#111; border:1px solid #1e1e1e; border-radius:8px; padding:12px 16px; margin-bottom:16px; }
    .sessions-title { font-size:0.75em; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
    .timeline       { position:relative; height:34px; background:#1a1a1a; border-radius:4px; overflow:hidden; margin-bottom:6px; }
    .tl-segment     { position:absolute; height:100%; display:flex; align-items:center;
                      justify-content:center; font-size:0.7em; }
    .tl-now         { position:absolute; width:2px; background:#FFD700; height:100%; z-index:10; top:0; }
    .tl-labels      { display:flex; justify-content:space-between; font-size:0.65em; color:#555; }
    .tl-legend      { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; }
    .tl-leg-item    { display:flex; align-items:center; gap:5px; font-size:0.72em; color:#888; }
    .tl-leg-dot     { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

    .status-bar { text-align:center; color:#444; font-size:0.72em; margin-top:10px; }
    @media(max-width:600px){ .ist-time{font-size:2em;} .ex-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="container">
  <h2>🌐 Global Exchange Clock</h2>
  <div class="subtitle">Live session status — all times in IST</div>

  <div class="master-clock">
    <div class="ist-label">India Standard Time (IST / UTC+5:30)</div>
    <div class="ist-time" id="ist-time">--:--:--</div>
    <div class="ist-date" id="ist-date">--</div>
  </div>

  <div class="sessions-bar">
    <div class="sessions-title">📅 Today's Sessions — IST 24hr Timeline</div>
    <div class="timeline" id="timeline">
      <div class="tl-now" id="tl-now"></div>
    </div>
    <div class="tl-labels">
      <span>12AM</span><span>3AM</span><span>6AM</span><span>9AM</span>
      <span>12PM</span><span>3PM</span><span>6PM</span><span>9PM</span><span>12AM</span>
    </div>
    <div class="tl-legend" id="tl-legend"></div>
  </div>

  <div class="ex-grid" id="ex-grid"></div>
  <div class="status-bar" id="status-bar">Updates every second</div>
</div>

<script>
// ── Exchange data ─────────────────────────────────────────────────────────────
// sessions: array of {openH, openM, closeH, closeM}
// closeH can be > 23 for overnight (e.g. closeH=27 = 3AM next day)
const EX = [
  {
    id:'mcx', flag:'🇮🇳', name:'MCX India',
    loc:'Mumbai · IST', tz:'Asia/Kolkata', tzLabel:'IST', color:'#2f9e44',
    note:'Gold, Silver, Crude Futures',
    sessions:[{openH:9,openM:0,closeH:23,closeM:30}],
    preH:8, preM:45
  },
  {
    id:'nse', flag:'🇮🇳', name:'NSE Commodity',
    loc:'Mumbai · IST', tz:'Asia/Kolkata', tzLabel:'IST', color:'#1971c2',
    note:'NSE Commodity Derivatives',
    sessions:[{openH:9,openM:0,closeH:23,closeM:30}],
    preH:8, preM:45
  },
  {
    id:'comex', flag:'🇺🇸', name:'COMEX / CME',
    loc:'New York · ET', tz:'America/New_York', tzLabel:'ET', color:'#e03131',
    note:'Gold (GC), Silver (SI) Globex',
    // Globex: Sun 6PM ET to Fri 5PM ET
    // In IST: opens 4:30 AM, runs overnight, closes 3:00 AM next day
    // We model as: open 0:00 to 3:00 AND 4:30 to 23:59 (split at midnight)
    sessions:[
      {openH:0, openM:0,  closeH:3,  closeM:0},
      {openH:4, openM:30, closeH:23, closeM:59}
    ],
    preH:4, preM:15
  },
  {
    id:'lbma', flag:'🇬🇧', name:'LBMA London',
    loc:'London · GMT/BST', tz:'Europe/London', tzLabel:'GMT', color:'#9c36b5',
    note:'Gold & Silver Spot OTC',
    sessions:[{openH:13,openM:30,closeH:21,closeM:30}],
    preH:13, preM:15
  },
  {
    id:'sge', flag:'🇨🇳', name:'SGE Shanghai',
    loc:'Shanghai · CST', tz:'Asia/Shanghai', tzLabel:'CST', color:'#f03e3e',
    note:'Shanghai Gold Exchange',
    sessions:[
      {openH:6,  openM:30, closeH:11, closeM:30},
      {openH:13, openM:0,  closeH:16, closeM:0},
      {openH:21, openM:0,  closeH:23, closeM:30}
    ],
    preH:6, preM:15
  },
  {
    id:'tocom', flag:'🇯🇵', name:'TOCOM Tokyo',
    loc:'Tokyo · JST', tz:'Asia/Tokyo', tzLabel:'JST', color:'#f76707',
    note:'Tokyo Commodity Exchange',
    sessions:[
      {openH:5,  openM:45, closeH:14, closeM:30},
      {openH:16, openM:30, closeH:23, closeM:30}
    ],
    preH:5, preM:30
  },
  {
    id:'dgcx', flag:'🇦🇪', name:'DGCX Dubai',
    loc:'Dubai · GST', tz:'Asia/Dubai', tzLabel:'GST', color:'#1098ad',
    note:'Dubai Gold & Commodities',
    sessions:[{openH:11,openM:30,closeH:23,closeM:30}],
    preH:11, preM:15
  },
  {
    id:'ibja', flag:'🇮🇳', name:'IBJA Spot Rate',
    loc:'Mumbai · IST', tz:'Asia/Kolkata', tzLabel:'IST', color:'#FFD700',
    note:'India Bullion & Jewellers Assoc.',
    sessions:[
      {openH:11,openM:30,closeH:12,closeM:0},
      {openH:17,openM:0, closeH:17,closeM:30}
    ],
    preH:11, preM:15
  }
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function nowIST(){
  const d = new Date();
  const ist = new Date(d.toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  return {h: ist.getHours(), m: ist.getMinutes(), s: ist.getSeconds(),
          totalMin: ist.getHours()*60 + ist.getMinutes() + ist.getSeconds()/60};
}

function timeInTZ(tz){
  return new Date().toLocaleString('en-US',{
    timeZone:tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  });
}
function dateInTZ(tz){
  return new Date().toLocaleString('en-IN',{
    timeZone:tz, weekday:'short', day:'numeric', month:'short'
  });
}
function fmtCD(mins){
  if(mins <= 0) return 'Now';
  const h = Math.floor(mins/60), m = Math.floor(mins%60), s = Math.floor((mins*60)%60);
  return (h>0?h+'h ':'') + m+'m ' + s+'s';
}

// ── Status logic ──────────────────────────────────────────────────────────────
function getStatus(ex, nowMin){
  const WARN = 30;
  let status = 'closed', pct = 0, cdMins = 0, cdLabel = 'Opens in';

  // Check if in any session
  for(const s of ex.sessions){
    const o = s.openH*60 + s.openM;
    const c = s.closeH*60 + s.closeM;
    if(nowMin >= o && nowMin < c){
      status = 'open';
      pct = Math.min(100, ((nowMin-o)/(c-o))*100);
      cdMins = c - nowMin;
      cdLabel = 'Closes in';
      if(cdMins <= WARN) status = 'soon-close';
      break;
    }
  }

  // Pre-open check
  if(status === 'closed'){
    const preMin = ex.preH*60 + ex.preM;
    const firstOpen = ex.sessions[0].openH*60 + ex.sessions[0].openM;
    if(nowMin >= preMin && nowMin < firstOpen){
      status = 'pre';
      cdMins = firstOpen - nowMin;
      cdLabel = 'Opens in';
    }
  }

  // Find next open countdown
  if(status === 'closed'){
    let minDiff = 9999;
    for(const s of ex.sessions){
      const o = s.openH*60 + s.openM;
      let diff = o - nowMin;
      if(diff < 0) diff += 1440;
      if(diff < minDiff) minDiff = diff;
    }
    cdMins = minDiff;
    cdLabel = 'Opens in';
  }

  return {status, pct, cdMins, cdLabel};
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards(){
  const {totalMin} = nowIST();
  const grid = document.getElementById('ex-grid');

  EX.forEach(ex => {
    const {status, pct, cdMins, cdLabel} = getStatus(ex, totalMin);
    const localT = timeInTZ(ex.tz);
    const localD = dateInTZ(ex.tz);
    const istT   = timeInTZ('Asia/Kolkata');

    const badges = {
      open:       ['badge-open',       '🟢 OPEN'],
      closed:     ['badge-closed',     '🔴 CLOSED'],
      pre:        ['badge-pre',        '🔵 PRE-OPEN'],
      'soon-open':['badge-soon-open',  '🟡 OPENING SOON'],
      'soon-close':['badge-soon-close','🟠 CLOSING SOON']
    };
    const [bCls, bTxt] = badges[status] || ['badge-closed','🔴 CLOSED'];

    const sessStr = ex.sessions.map(s =>
      `${String(s.openH).padStart(2,'0')}:${String(s.openM).padStart(2,'0')} – ` +
      `${String(s.closeH%24).padStart(2,'0')}:${String(s.closeM).padStart(2,'0')} IST`
    ).join(' · ');

    const cdColor = cdLabel.includes('Closes') ? '#ff9a00' : '#51cf66';
    const fillCls = status==='open' ? 'fill-open' : status==='soon-close' ? 'fill-soon' : 'fill-closed';

    let card = document.getElementById('card-'+ex.id);
    if(!card){ card = document.createElement('div'); card.id='card-'+ex.id; grid.appendChild(card); }

    card.className = 'ex-card ' + status;
    card.innerHTML = `
      <div class="ex-header">
        <div class="ex-name">${ex.flag} ${ex.name}</div>
        <span class="status-badge ${bCls}">${bTxt}</span>
      </div>
      <div style="font-size:0.7em;color:#555;margin-bottom:8px">${ex.loc} · ${ex.note}</div>
      <div class="ex-times">
        <div class="ex-time-block">
          <div class="ex-time-label">Local Time</div>
          <div class="ex-time-val" style="color:${ex.color}">${localT}</div>
          <div class="ex-time-sub">${localD} ${ex.tzLabel}</div>
        </div>
        <div class="ex-time-block">
          <div class="ex-time-label">IST</div>
          <div class="ex-time-val" style="color:#FFD700">${istT}</div>
          <div class="ex-time-sub">India Standard Time</div>
        </div>
      </div>
      <div class="ex-hours" style="margin-top:8px">
        🕐 <span>${sessStr}</span>
      </div>
      ${cdMins > 0 ? `<div class="countdown">
        <div class="cd-label">${cdLabel}</div>
        <div class="cd-val" style="color:${cdColor}">${fmtCD(cdMins)}</div>
      </div>` : ''}
      <div class="session-bar">
        <div class="session-fill ${fillCls}" style="width:${pct.toFixed(1)}%"></div>
      </div>
    `;
  });
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function renderTimeline(){
  const {totalMin} = nowIST();
  const timeline = document.getElementById('timeline');

  // Remove old segments
  timeline.querySelectorAll('.tl-segment').forEach(e=>e.remove());

  EX.forEach(ex => {
    ex.sessions.forEach(s => {
      const oP = (s.openH*60+s.openM)/1440*100;
      const cP = Math.min(100,(s.closeH*60+s.closeM)/1440*100);
      if(cP <= oP) return;
      const seg = document.createElement('div');
      seg.className = 'tl-segment';
      seg.style.cssText = `left:${oP}%;width:${cP-oP}%;background:${ex.color}44;border-left:2px solid ${ex.color};color:${ex.color};`;
      seg.title = ex.name;
      if(cP-oP > 4) seg.textContent = ex.flag;
      timeline.appendChild(seg);
    });
  });

  document.getElementById('tl-now').style.left = (totalMin/1440*100)+'%';

  // Legend (build once)
  const legend = document.getElementById('tl-legend');
  if(!legend.children.length){
    EX.forEach(ex=>{
      const item = document.createElement('div');
      item.className = 'tl-leg-item';
      item.innerHTML = `<div class="tl-leg-dot" style="background:${ex.color}"></div>${ex.flag} ${ex.name}`;
      legend.appendChild(item);
    });
  }
}

// ── Master clock ──────────────────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  document.getElementById('ist-time').textContent =
    now.toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('ist-date').textContent =
    now.toLocaleString('en-IN',{timeZone:'Asia/Kolkata',weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function tick(){
  updateClock();
  renderCards();
  renderTimeline();
  document.getElementById('status-bar').textContent =
    'Last updated: ' + new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) + ' IST';
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
